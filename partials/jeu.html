<base href="/">
<div align="center" id="main" style="margin-top: 2em;">
<a href="/"  style="color:#FFFFFF" class="pure-menu-link">ZOO</a>
</div>

<script>
// The Hidden Pixel - Basic Game Prototype

// Create the canvas and load the image
document.body.style.margin = "0";
document.body.style.overflow = "hidden";
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const img = new Image();
img.src = 'https://static.nationalgeographic.fr/files/styles/image_3200/public/08-love-and-beauty.webp?w=1600&h=900'; // Replace with the URL or path to your artwork

// Pixel placement (random)
const hiddenPixel = {
  x: Math.floor(Math.random() * canvas.width),
  y: Math.floor(Math.random() * canvas.height),
};
const detectionRadius = 5; // Pixel detection tolerance

// Load and draw the image
img.onload = () => {
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
};

// Check for hover over hidden pixel
canvas.addEventListener('mousemove', (e) => {
  const mouseX = e.clientX;
  const mouseY = e.clientY;

  const dist = Math.sqrt(
    Math.pow(mouseX - hiddenPixel.x, 2) + Math.pow(mouseY - hiddenPixel.y, 2)
  );

  if (dist <= detectionRadius) {
    showWinMessage();
  }
});

// Display win message
function showWinMessage() {
  canvas.removeEventListener('mousemove', arguments.callee);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('You found the hidden pixel!', canvas.width / 2, canvas.height / 2);

  ctx.font = '24px Arial';
  ctx.fillText('Refresh the page to try again!', canvas.width / 2, canvas.height / 2 + 50);
}

</script>
